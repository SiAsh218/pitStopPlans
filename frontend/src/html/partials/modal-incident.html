<div class="modal-form hidden" id="modal-form-incident">
  <div class="modal-form__overlay"></div>

  <div class="modal-form__container">
    <button class="modal-form__close" type="button">&times;</button>

    <h2 class="modal-form__title">Create Incident</h2>

    <form class="modal-form__form" id="incident-form">
      <div class="modal-form__group">
        <label class="modal-form__label" for="modal-form-incident-title">
          Title
        </label>

        <input
          class="modal-form__input"
          type="text"
          id="modal-form-incident-title"
          name="title"
          required
        />
      </div>

      <div class="modal-form__group">
        <label class="modal-form__label" for="modal-form-incident-type">
          Incident Type
        </label>

        <select
          class="modal-form__input"
          id="modal-form-incident-type"
          name="incident-type"
          required
        ></select>
      </div>

      <div class="modal-form__group">
        <label class="modal-form__label" for="modal-form-incident-description">
          Description
        </label>

        <textarea
          class="modal-form__input"
          id="modal-form-incident-description"
          name="description"
          rows="5"
        ></textarea>
      </div>

      <button
        class="btn btn-primary"
        id="modal-form__submit--incident"
        type="submit"
      >
        Create Incident
      </button>
    </form>
  </div>
</div>

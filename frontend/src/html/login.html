<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{title}}</title>
  </head>

  <body>
    <div class="container">
      <h1>{{title}}</h1>

      <!-- ===== AUTH SECTION ===== -->
      <div class="auth-container" id="auth-container">
        <h2>Login</h2>

        <form id="login-form">
          <input type="text" name="email" placeholder="Email" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>

      
    </div>

    <!-- Webpack bundle (JS + CSS) -->
    <script src="/dist/bundle.js"></script>
  </body>
</html>
